<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Управление процессами</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .navbar-brand {
            font-weight: bold;
        }
        .user-info {
            color: white;
            margin-right: 15px;
        }
        .user-info i {
            margin-right: 5px;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="/">
                <i class="fas fa-tasks"></i> Управление процессами
            </a>
            <div class="d-flex align-items-center">
                <div class="user-info">
                    <i class="fas fa-user"></i> {{ user.username }}
                </div>
                <a href="/logout" class="btn btn-outline-light btn-sm">
                    <i class="fas fa-sign-out-alt"></i> Выйти
                </a>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="row mb-4">
            <div class="col">
                <h1><i class="fas fa-project-diagram"></i> Доступные процессы</h1>
                <p class="text-muted">Выберите процесс для запуска</p>
            </div>
            <div class="col-auto">
                <a href="/history" class="btn btn-info me-2">
                    <i class="fas fa-history"></i> История
                </a>
            </div>
        </div>

        <div class="row">
            {% for process in processes %}
            <div class="col-md-4 mb-4">
                <div class="card h-100 shadow-sm">
                    <div class="card-body">
                        <h5 class="card-title">
                            <i class="fas fa-cogs"></i> {{ process.name }}
                        </h5>
                        <p class="card-text">{{ process.description }}</p>
                        <p class="text-muted small">
                            <i class="fas fa-code-branch"></i> ID: {{ process.id }}<br>
                            <i class="fas fa-variable"></i> Переменных: {{ process.variables|length }}
                        </p>
                        <button class="btn btn-primary start-process-btn"
                                data-process-id="{{ process.id }}"
                                data-process-name="{{ process.name }}">
                            <i class="fas fa-play"></i> Запустить процесс
                        </button>
                    </div>
                </div>
            </div>
            {% endfor %}
        </div>
    </div>

    <!-- Модальное окно для формы процесса -->
    <div class="modal fade" id="processModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Запуск процесса</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div id="process-form-container"></div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Отмена</button>
                    <button type="button" class="btn btn-primary" id="submit-process">Запустить</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        let currentProcessId = null;
        let currentFormSchema = null;

        // Обработчики кнопок запуска процессов
        document.querySelectorAll('.start-process-btn').forEach(btn => {
            btn.addEventListener('click', async () => {
                currentProcessId = btn.dataset.processId;
                await loadFormSchema(currentProcessId);
                const modal = new bootstrap.Modal(document.getElementById('processModal'));
                modal.show();
            });
        });

        // Загрузка схемы формы
        async function loadFormSchema(processId) {
            try {
                const response = await fetch(`/api/processes/${processId}/form_schema`);
                const data = await response.json();

                if (data.success) {
                    currentFormSchema = data.schema;
                    renderForm(data.schema);
                } else {
                    showError('Не удалось загрузить форму процесса');
                }
            } catch (error) {
                console.error('Error loading form schema:', error);
                showError('Ошибка загрузки формы');
            }
        }

        // Рендеринг формы
        function renderForm(schema) {
            const container = document.getElementById('process-form-container');
            container.innerHTML = '';

            if (schema && schema.fields) {
                schema.fields.forEach(field => {
                    const formGroup = document.createElement('div');
                    formGroup.className = 'mb-3';

                    const label = document.createElement('label');
                    label.className = 'form-label';
                    label.textContent = field.label + (field.required ? ' *' : '');
                    label.htmlFor = field.name;

                    let input;
                    if (field.type === 'textarea') {
                        input = document.createElement('textarea');
                        input.className = 'form-control';
                        input.rows = 3;
                    } else if (field.type === 'select' && field.options) {
                        input = document.createElement('select');
                        input.className = 'form-select';
                        field.options.forEach(option => {
                            const opt = document.createElement('option');
                            opt.value = option.value;
                            opt.textContent = option.label;
                            input.appendChild(opt);
                        });
                    } else if (field.type === 'checkbox') {
                        input = document.createElement('input');
                        input.type = 'checkbox';
                        input.className = 'form-check-input';
                        label.className = 'form-check-label';
                        formGroup.className = 'form-check mb-3';
                    } else {
                        input = document.createElement('input');
                        input.type = field.type || 'text';
                        input.className = 'form-control';
                    }

                    input.id = field.name;
                    input.name = field.name;
                    if (field.required) input.required = true;
                    if (field.placeholder) input.placeholder = field.placeholder;

                    if (field.type === 'checkbox') {
                        formGroup.appendChild(input);
                        formGroup.appendChild(label);
                    } else {
                        formGroup.appendChild(label);
                        formGroup.appendChild(input);
                    }

                    if (field.description) {
                        const helpText = document.createElement('div');
                        helpText.className = 'form-text text-muted';
                        helpText.textContent = field.description;
                        formGroup.appendChild(helpText);
                    }

                    container.appendChild(formGroup);
                });
            } else {
                container.innerHTML = '<p class="text-muted">Нет дополнительных параметров для ввода</p>';
            }
        }

        // Обработка запуска процесса
        document.getElementById('submit-process').addEventListener('click', async () => {
            const form = document.getElementById('process-form-container');
            const variables = {};

            if (currentFormSchema && currentFormSchema.fields) {
                currentFormSchema.fields.forEach(field => {
                    const element = document.getElementById(field.name);
                    if (element) {
                        if (field.type === 'checkbox') {
                            variables[field.name] = element.checked;
                        } else {
                            variables[field.name] = element.value;
                        }
                    }
                });
            }

            // Добавляем автора
            variables.author = '{{ user.username }}';

            try {
                const response = await fetch('/start_process', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        definition_id: currentProcessId,
                        variables: variables,
                        created_by: '{{ user.username }}'
                    })
                });

                const result = await response.json();

                if (result.success) {
                    alert(`Процесс запущен успешно!\nID процесса: ${result.process_instance_id}\nРезультат: ${JSON.stringify(result.result)}`);
                    bootstrap.Modal.getInstance(document.getElementById('processModal')).hide();
                    // Обновляем страницу для отображения нового запуска
                    setTimeout(() => location.reload(), 1000);
                } else {
                    alert(`Ошибка: ${result.error}`);
                }
            } catch (error) {
                console.error('Error starting process:', error);
                alert('Ошибка при запуске процесса');
            }
        });

        function showError(message) {
            const container = document.getElementById('process-form-container');
            container.innerHTML = `<div class="alert alert-danger">${message}</div>`;
        }
    </script>
</body>
</html>
