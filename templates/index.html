<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Запуск процессов</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
            background: #f5f5f5;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            padding: 20px 30px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        h1 {
            font-size: 24px;
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-top: 15px;
            font-weight: bold;
        }
        input, textarea {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-family: monospace;
        }
        textarea {
            height: 120px;
            resize: vertical;
        }
        button {
            margin-top: 20px;
            padding: 10px 20px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
        }
        button:hover {
            background: #0056b3;
        }
        .message {
            margin-top: 20px;
            padding: 12px;
            border-radius: 4px;
            display: none;
        }
        .success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        .loading {
            background: #e2e3e5;
            color: #383d41;
            border: 1px solid #d6d8db;
        }
        .example {
            background: #e9ecef;
            padding: 10px;
            border-radius: 4px;
            margin-top: 15px;
            font-size: 14px;
        }
        .example pre {
            margin: 5px 0;
        }
    </style>
</head>
<body>
<div class="container">
    <a href="/history" class="btn btn-info">📊 История</a>
    <h1>Запуск процесса</h1>

    <label for="processSelect">Выберите процесс:</label>
    <select id="processSelect" required>
        <option value="">-- выберите --</option>
    </select>

    <div id="dynamicForm"></div>
    <button id="submitBtn" style="display:none;">♦ Запустить процесс ♦</button>
    <div id="messageBox" class="message"></div>
</div>

<script>
    let currentSchema = null;

    // Загрузка списка процессов из /api/processes
    fetch('/api/processes')
        .then(r => r.json())
        .then(data => {
            if (data.success) {
                const select = document.getElementById('processSelect');
                data.processes.forEach(proc => {
                    const option = document.createElement('option');
                    const procId = proc.id || proc.proc_id || proc.definition_id;
                    if (!procId) return;
                    option.value = procId;
                    option.textContent = proc.name || proc.proc_name || procId;
                    select.appendChild(option);
                });
            }
        });

    document.getElementById('processSelect').addEventListener('change', function() {
        const procId = this.value;
        if (!procId) return;
        fetch(`/api/processes/${procId}/form_schema`)
            .then(r => r.json())
            .then(data => {
                if (data.success) {
                    currentSchema = data.schema;
                    renderForm(data.schema.fields);
                    document.getElementById('submitBtn').style.display = 'block';
                } else {
                    document.getElementById('dynamicForm').innerHTML = '<p class="error">Ошибка загрузки формы</p>';
                }
            });
    });

    function renderForm(fields) {
        const container = document.getElementById('dynamicForm');
        container.innerHTML = '';
        fields.forEach(field => {
            const wrapper = document.createElement('div');
            wrapper.className = 'form-field';
            wrapper.style.marginBottom = '15px';

            const label = document.createElement('label');
            label.textContent = field.label + (field.required ? ' *' : '');
            label.htmlFor = field.name;
            label.style.display = 'block';
            label.style.fontWeight = 'bold';
            label.style.marginBottom = '5px';

            let input;

            if (field.type === 'select') {
                input = document.createElement('select');
                input.name = field.name;
                input.id = field.name;
                const emptyOption = document.createElement('option');
                emptyOption.value = '';
                emptyOption.textContent = '-- выберите --';
                input.appendChild(emptyOption);
                field.options.forEach(opt => {
                    const option = document.createElement('option');
                    option.value = opt;
                    option.textContent = opt;
                    input.appendChild(option);
                });
                if (field.default && field.default !== undefined) {
                    input.value = field.default;
                }
            }
            else if (field.type === 'checkbox') {
                input = document.createElement('input');
                input.type = 'checkbox';
                input.name = field.name;
                input.id = field.name;
                if (field.default === true) input.checked = true;
                // checkbox не требует step и placeholder
            }
            else if (field.type === 'json') {
                input = document.createElement('textarea');
                input.name = field.name;
                input.id = field.name;
                input.rows = 6;
                input.style.fontFamily = 'monospace';
                if (field.placeholder) input.placeholder = field.placeholder;
                if (field.default && typeof field.default === 'object') {
                    input.value = JSON.stringify(field.default, null, 2);
                }
            }
            else {
                input = document.createElement('input');
                input.type = field.type || 'text';
                input.name = field.name;
                input.id = field.name;
                if (field.placeholder) input.placeholder = field.placeholder;
                if (field.step) input.step = field.step;
                if (field.default !== undefined && field.default !== null) input.value = field.default;
            }

            input.required = field.required;
            wrapper.appendChild(label);
            wrapper.appendChild(input);
            container.appendChild(wrapper);
        });
    }

    document.getElementById('submitBtn').addEventListener('click', async () => {
        const procId = document.getElementById('processSelect').value;
        if (!procId) {
            showMessage('Выберите процесс', 'error');
            return;
        }
        if (!currentSchema) {
            showMessage('Сначала загрузите форму процесса', 'error');
            return;
        }

        const variables = {};
        for (const field of currentSchema.fields) {
            const el = document.getElementById(field.name);
            if (!el) continue;

            let value;
            if (field.type === 'checkbox') {
                value = el.checked;
            }
            else if (field.type === 'json') {
                const rawValue = el.value.trim();
                if (rawValue === '') {
                    value = null;
                } else {
                    try {
                        value = JSON.parse(rawValue);
                    } catch (e) {
                        showMessage(`Ошибка в поле "${field.label}": неверный JSON`, 'error');
                        return;
                    }
                }
            }
            else {
                value = el.value;
                // Приводим числовые поля к number
                if (field.type === 'number' && value !== '') {
                    value = Number(value);
                }
            }
            // Добавляем только непустые значения (по желанию)
            if (value !== '' && value !== null && value !== undefined) {
                variables[field.name] = value;
            }
        }

        const response = await fetch('/start_process', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                definition_id: procId,
                variables: variables,
                created_by: variables.author || variables.created_by || 'system'
            })
        });
        const result = await response.json();
        if (response.ok && result.success) {
            showMessage(result.message || 'Процесс успешно запущен', 'success');
            // Очистка формы опционально
            // document.getElementById('dynamicForm').innerHTML = '';
            // document.getElementById('processSelect').value = '';
            // document.getElementById('submitBtn').style.display = 'none';
        } else {
            showMessage(`Ошибка: ${result.error || result.message || 'Неизвестная ошибка'}`, 'error');
        }
    });

    function showMessage(text, type) {
        const messageBox = document.getElementById('messageBox');
        messageBox.textContent = text;
        messageBox.className = `message ${type}`;
        messageBox.style.display = 'block';
        if (type !== 'loading') {
            setTimeout(() => {
                if (messageBox.className.includes(type)) {
                    messageBox.style.display = 'none';
                }
            }, 5000);
        }
    }
</script>
</body>
</html>
